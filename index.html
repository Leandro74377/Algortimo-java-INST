<!DOCTYPE html> <!-- promedio notas -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario y Tabla</title>
    <!-- Agregar Bootstrap -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Formulario de Registro</h2>
        <form id="form">
            <div class="form-group">
                <label for="name">Nombre:</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Correo electrónico:</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="age">Edad:</label>
                <input type="number" class="form-control" id="age" name="age" required>
            </div>

            <h3>Notas:</h3>
            <div class="form-group">
                <label for="note1">Nota 1:</label>
                <input type="number" class="form-control" id="note1" name="note1" required>
            </div>
            <div class="form-group">
                <label for="note2">Nota 2:</label>
                <input type="number" class="form-control" id="note2" name="note2" required>
            </div>
            <div class="form-group">
                <label for="note3">Nota 3:</label>
                <input type="number" class="form-control" id="note3" name="note3" required>
            </div>

            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>

        <h2 class="mt-5">Usuarios Registrados</h2>
        <table id="userTable" class="table">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Edad</th>
                    <th>Promedio</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
           </script>

    <!-- Agregar Bootstrap JS y jQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
